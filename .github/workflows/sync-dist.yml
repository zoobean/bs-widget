name: Sync dist bundle

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "rollup.config.js"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/sync-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build bundle
        run: yarn build

      - name: Commit updated dist bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/bundle.js
          if git diff --cached --quiet -- dist/bundle.js; then
            echo "No dist changes to commit."
            exit 0
          fi
          git commit -m "chore: sync dist bundle [skip ci]"
          git push